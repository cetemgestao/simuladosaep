<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Prova</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

.questao {
    margin-bottom: 25px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 15px;
}

.alternativas label {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

#resultado {
    margin-top: 30px;
    padding: 15px;
    background: #eee;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Simulado</h1>

    <div id="questoes">Carregando questões...</div>

    <button onclick="finalizarProva()">Finalizar Prova</button>

    <div id="resultado"></div>
</div>

<script>
// ================= CONFIG =================
const SHEET_ID = "COLE_SEU_ID_AQUI";
const QUESTOES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Questoes`;

let bancoQuestoes = [];

// ================= CARREGAR =================
window.onload = carregarQuestoes;

async function carregarQuestoes() {
    try {
        const res = await fetch(QUESTOES_URL);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(47).slice(0, -2));

        bancoQuestoes = json.table.rows.slice(1).map(r => ({
            id: r.c[0]?.v,
            disciplina: r.c[1]?.v,
            enunciado: r.c[2]?.v,
            A: r.c[3]?.v,
            B: r.c[4]?.v,
            C: r.c[5]?.v,
            D: r.c[6]?.v,
            correta: r.c[7]?.v
        }));

        renderizarQuestoes();

    } catch (e) {
        document.getElementById("questoes").innerHTML = "Erro ao carregar.";
    }
}

// ================= RENDER =================
function renderizarQuestoes() {
    const container = document.getElementById("questoes");
    container.innerHTML = "";

    bancoQuestoes.forEach((q, i) => {
        container.innerHTML += `
        <div class="questao">
            <div><b>${i + 1}. ${q.enunciado}</b></div>

            <div class="alternativas">
                ${["A","B","C","D"].map(letra => `
                    <label>
                        <input type="radio" name="q${q.id}" value="${letra}">
                        ${letra}) ${q[letra]}
                    </label>
                `).join("")}
            </div>

            <div id="res${q.id}"></div>
        </div>
        `;
    });
}

// ================= RESULTADO =================
function finalizarProva() {
    let acertos = 0;

    bancoQuestoes.forEach(q => {
        let marcada = document.querySelector(`input[name="q${q.id}"]:checked`);
        let res = document.getElementById(`res${q.id}`);

        if (!marcada) {
            res.innerHTML = "⚠️ Não respondida";
            res.style.color = "orange";
            return;
        }

        if (marcada.value === q.correta) {
            acertos++;
            res.innerHTML = "✅ Correto";
            res.style.color = "green";
        } else {
            res.innerHTML = `❌ Errado (Correta: ${q.correta})`;
            res.style.color = "red";
        }
    });

    document.getElementById("resultado").innerHTML =
        `Resultado final: ${acertos} / ${bancoQuestoes.length}`;
}
</script>

</body>
</html>
