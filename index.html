<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIMULADOR SAEP-CETEM</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#f5f5f5; }

#indice {
  width:220px;
  background:#004aad;
  color:white;
  padding:10px;
  height:100vh;
  overflow:auto;
}

#indice button {
  width:100%;
  margin:3px 0;
  padding:6px;
  border:none;
  cursor:pointer;
}

#indice button.green {
  background:#4CAF50;
}

#conteudo {
  flex:1;
  padding:20px;
  background:white;
}

.questao {
  margin-bottom:25px;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
}

img {
  max-width:100%;
  margin:10px 0;
}
</style>

</head>

<body>

<div id="indice"></div>

<div id="conteudo">

<input id="nome" placeholder="Seu nome"><br><br>

<div id="questoes"></div>

<button onclick="finalizar()">FINALIZAR</button>

<div id="resultado"></div>

<hr>

<h3>Ranking</h3>
<div id="ranking"></div>

<div style="margin-top:40px;text-align:center;">
<a href="painel.html" target="_blank">
<button style="padding:10px;background:#4CAF50;color:white;border:none;">
INSERIR QUESTÕES
</button>
</a>
</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzrLDvGQAMCLednv5XB4hF7_xC2U90tsAd-vafWGzBgHbNb2bkaHPfoDMzMl3npXI_MbA/exec";

let questoes = [];

async function carregar() {
  const res = await fetch(API + "?tipo=LISTAR_QUESTOES");
  questoes = await res.json();

  questoes = questoes.sort(()=>0.5-Math.random()).slice(0,40);

  render();
  ranking();
}

function render() {
  let qDiv = document.getElementById("questoes");
  let iDiv = document.getElementById("indice");

  qDiv.innerHTML = "";
  iDiv.innerHTML = "<h3>ÍNDICE</h3>";

  questoes.forEach((q,i)=>{
    iDiv.innerHTML += `<button onclick="scrollQ(${i})">${i+1}</button>`;

    qDiv.innerHTML += `
    <div class="questao" id="q${i}">

    <div><b>${i+1}.</b> ${q.enunciado}</div>

    ${q.imagem ? `<img src="${q.imagem}">` : ""}

    ${["A","B","C","D"].map(l=>`
      <label style="display:block;margin:5px 0;">
        <input type="radio" name="q${i}" value="${l}" onchange="marcar(${i})">
        ${l}) <span>${q[l]}</span>
      </label>
    `).join("")}

    <div id="r${i}"></div>

    </div>`;
  });
}

function scrollQ(i){
  document.getElementById("q"+i).scrollIntoView();
}

function marcar(i){
  document.querySelectorAll("#indice button")[i].classList.add("green");
}

async function finalizar(){
  let acertos = 0;

  questoes.forEach((q,i)=>{
    let m = document.querySelector(`input[name="q${i}"]:checked`);
    let r = document.getElementById("r"+i);

    if(!m){
      r.innerHTML="⚠️";
    } else if(m.value===q.gabarito){
      acertos++;
      r.innerHTML="✅";
    } else {
      r.innerHTML=`❌ (${q.gabarito})`;
    }
  });

  document.getElementById("resultado").innerHTML =
    `Resultado: ${acertos}/${questoes.length}`;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      tipo:"SALVAR_RESULTADO",
      nome:document.getElementById("nome").value || "Aluno",
      acertos,
      total:questoes.length
    })
  });

  ranking();
}

async function ranking(){
  let res = await fetch(API+"?tipo=RANKING");
  let data = await res.json();

  document.getElementById("ranking").innerHTML =
    data.map(r=>`<div>${r.nome} - ${r.percentual.toFixed(1)}%</div>`).join("");
}

carregar();
</script>

</body>
</html>
