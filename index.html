<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SAEP — Simulados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #004aad;
  --azul-escuro: #00317a;
  --azul-brilho: #1a6dd4;
  --verde: #00b86b;
  --verde-escuro: #008f52;
  --branco: #ffffff;
  --cinza-claro: #f4f6fa;
  --cinza-medio: #e2e8f4;
  --texto: #1a2340;
  --texto-muted: #5a6a8a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--texto);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── FUNDO ANIMADO ── */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,74,173,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 80%, rgba(0,184,107,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 50% 50%, rgba(0,49,122,0.4) 0%, transparent 70%),
    #0d1a30;
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── LAYOUT ── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  padding: 28px 40px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeDown 0.6s ease both;
}
.logo-marca {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-badge {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--azul-brilho), var(--verde));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 1.3rem; color: white;
  letter-spacing: -1px;
  box-shadow: 0 4px 20px rgba(0,74,173,0.5);
}
.logo-texto h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 1.3rem;
  color: white; letter-spacing: 3px;
  line-height: 1;
}
.logo-texto span {
  font-size: 0.7rem; color: rgba(255,255,255,0.5);
  letter-spacing: 2px; text-transform: uppercase;
}
.header-ano {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem; color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
}

/* ── HERO ── */
.hero {
  padding: 60px 40px 40px;
  animation: fadeDown 0.7s ease 0.1s both;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(0,184,107,0.15);
  border: 1px solid rgba(0,184,107,0.3);
  border-radius: 100px;
  padding: 5px 14px;
  margin-bottom: 20px;
}
.hero-tag-dot {
  width: 7px; height: 7px;
  background: var(--verde);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
.hero-tag span {
  font-size: 0.75rem; font-weight: 600;
  color: var(--verde); letter-spacing: 1px; text-transform: uppercase;
}
.hero h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: clamp(2.4rem, 5vw, 4rem);
  color: white; line-height: 1.05;
  letter-spacing: -1px;
}
.hero h2 em {
  font-style: normal;
  background: linear-gradient(90deg, #4da6ff, var(--verde));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  margin-top: 14px;
  font-size: 1rem; color: rgba(255,255,255,0.55);
  max-width: 500px; line-height: 1.6; font-weight: 300;
}

/* ── GRID DE CURSOS ── */
.cursos-section {
  padding: 0 40px 60px;
  flex: 1;
}
.cursos-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 20px;
}
.cursos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── CARD DE CURSO ── */
.curso-card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  text-decoration: none;
  display: block;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}
.curso-card:nth-child(1){ animation-delay: 0.15s; }
.curso-card:nth-child(2){ animation-delay: 0.22s; }
.curso-card:nth-child(3){ animation-delay: 0.29s; }
.curso-card:nth-child(4){ animation-delay: 0.36s; }
.curso-card:nth-child(5){ animation-delay: 0.43s; }
.curso-card:nth-child(6){ animation-delay: 0.50s; }

.curso-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,74,173,0.0) 0%, rgba(0,74,173,0.15) 100%);
  opacity: 0; transition: opacity 0.3s;
  border-radius: 16px;
}
.curso-card:hover {
  border-color: rgba(0,184,107,0.4);
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,184,107,0.2);
  background: rgba(255,255,255,0.07);
}
.curso-card:hover::before { opacity: 1; }

.card-brilho {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

.card-icone {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}
.card-nome {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 1.35rem;
  color: white; letter-spacing: 0.5px;
  line-height: 1.2;
  position: relative; z-index: 1;
  margin-bottom: 6px;
}
.card-desc {
  font-size: 0.83rem; color: rgba(255,255,255,0.45);
  line-height: 1.5; font-weight: 300;
  position: relative; z-index: 1;
  margin-bottom: 20px;
}
.card-meta {
  display: flex; align-items: center; gap: 14px;
  position: relative; z-index: 1;
  flex-wrap: wrap;
}
.meta-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.75rem; color: rgba(255,255,255,0.4);
}
.meta-item svg { opacity: 0.5; }

.card-seta {
  position: absolute; bottom: 24px; right: 24px;
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  z-index: 1;
}
.curso-card:hover .card-seta {
  background: var(--verde);
  transform: translateX(3px);
}

/* Cores dos ícones */
.icone-azul { background: rgba(0,74,173,0.25); }
.icone-verde { background: rgba(0,184,107,0.2); }
.icone-laranja { background: rgba(245,130,32,0.2); }
.icone-roxo { background: rgba(100,60,200,0.2); }
.icone-vermelho { background: rgba(220,50,50,0.2); }
.icone-ciano { background: rgba(0,180,200,0.2); }

/* ── FOOTER ── */
footer {
  padding: 20px 40px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-between;
  animation: fadeUp 0.5s ease 0.5s both;
}
.footer-texto {
  font-size: 0.75rem; color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
}
.footer-link {
  font-size: 0.75rem; color: rgba(255,255,255,0.15);
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}
.footer-link:hover { color: rgba(255,255,255,0.4); }

/* ── ANIMAÇÕES ── */
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-16px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── RESPONSIVO ── */
@media (max-width: 600px) {
  header, .hero, .cursos-section { padding-left: 20px; padding-right: 20px; }
  .hero { padding-top: 36px; }
  .cursos-grid { grid-template-columns: 1fr; }
  footer { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="page">

  <!-- HEADER -->
  <header>
    <div class="logo-marca">
      <div class="logo-badge">SP</div>
      <div class="logo-texto">
        <h1>SAEP</h1>
        <span>Sistema de Avaliação</span>
      </div>
    </div>
    <div class="header-ano" id="ano-letivo">2025</div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-tag">
      <div class="hero-tag-dot"></div>
      <span>Simulados disponíveis</span>
    </div>
    <h2>Escolha seu <em>curso</em><br>e comece o simulado</h2>
    <p>Questões elaboradas por instrutores. Gabarito imediato. Resultado salvo automaticamente.</p>
  </div>

  <!-- CURSOS -->
  <div class="cursos-section">
    <div class="cursos-label">Cursos disponíveis</div>
    <div class="cursos-grid" id="cursos-grid">
      <!-- gerado via JS -->
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span class="footer-texto">SENAI · SAEP · Avaliações</span>
    <a href="painel.html" class="footer-link">acesso restrito</a>
  </footer>

</div>

<script>
document.getElementById('ano-letivo').textContent = new Date().getFullYear();

// ── CONFIGURAÇÃO DOS CURSOS ──
// Para adicionar um novo curso, basta adicionar um objeto aqui.
const CURSOS = [
  {
    id: "ciber-sistemas",
    nome: "Ciber Sistemas",
    desc: "Automação, redes, IoT e sistemas cyber-físicos",
    icone: "⚡",
    cor: "icone-azul",
    questoes: 40,
    tempo: "2h"
  },
  {
    id: "instalacoes-eletricas",
    nome: "Instalações Elétricas",
    desc: "Projetos, normas NBR, dimensionamento e segurança",
    icone: "🔌",
    cor: "icone-verde",
    questoes: 40,
    tempo: "2h"
  },
  {
    id: "automacao-industrial",
    nome: "Automação Industrial",
    desc: "CLP, sensores, atuadores e sistemas SCADA",
    icone: "⚙️",
    cor: "icone-laranja",
    questoes: 40,
    tempo: "2h"
  },
  {
    id: "eletronica",
    nome: "Eletrônica",
    desc: "Circuitos analógicos, digitais e microcontroladores",
    icone: "🔬",
    cor: "icone-roxo",
    questoes: 40,
    tempo: "2h"
  },
  {
    id: "redes-computadores",
    nome: "Redes de Computadores",
    desc: "TCP/IP, infraestrutura, segurança e protocolos",
    icone: "🌐",
    cor: "icone-ciano",
    questoes: 40,
    tempo: "2h"
  }
];

function renderCursos() {
  const grid = document.getElementById('cursos-grid');
  grid.innerHTML = CURSOS.map(c => `
    <a class="curso-card" href="simulado.html?curso=${c.id}" title="${c.nome}">
      <div class="card-brilho"></div>
      <div class="card-icone ${c.cor}">${c.icone}</div>
      <div class="card-nome">${c.nome}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-meta">
        <span class="meta-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          ${c.tempo}
        </span>
        <span class="meta-item">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          ${c.questoes} questões
        </span>
      </div>
      <div class="card-seta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>
  `).join('');
}

renderCursos();
</script>
</body>
</html>
