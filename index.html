<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador SAEP - CETEM</title>

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }
.container { max-width: 1200px; margin:auto; background:white; padding:20px; }
.top { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
button { padding:10px; cursor:pointer; }
.questao { border-bottom:1px solid #ddd; padding:15px 0; }
#timer { font-size:18px; font-weight:bold; color:#c62828; }
.ranking { margin-top:20px; background:#f8f9fa; padding:10px; }
</style>
</head>

<body>

<div class="container">

<h2>Simulador de Prova</h2>

<div class="top">
<input id="nome" placeholder="Nome do aluno">
<select id="disciplina"></select>
<button onclick="iniciarProva()">Iniciar Prova</button>
<div id="timer">00:00</div>
</div>

<div id="questoes"></div>

<button onclick="finalizarProva()">Finalizar</button>

<div id="resultado"></div>

<div class="ranking">
<h3>🏆 Ranking</h3>
<div id="ranking"></div>
</div>

</div>

<script>
// ================= CONFIG =================
const QUESTOES_URL = "https://docs.google.com/spreadsheets/d/1oind2qzoQLR1T20J9yqOyYXKY64LDq9prhL9_ZEoawM/gviz/tq?tqx=out:json&sheet=Questoes";

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrLDvGQAMCLednv5XB4hF7_xC2U90tsAd-vafWGzBgHbNb2bkaHPfoDMzMl3npXI_MbA/exec";

let banco = [];
let prova = [];
let tempo = 0;
let intervalo;

// ================= INIT =================
window.onload = async () => {
    await carregarQuestoes();
    carregarRanking();
};

// ================= QUESTOES =================
async function carregarQuestoes() {
    const res = await fetch(QUESTOES_URL);
    const txt = await res.text();
    const json = JSON.parse(txt.substring(47).slice(0,-2));

    banco = json.table.rows.slice(1).map(r => ({
        id: r.c[0]?.v,
        disc: r.c[1]?.v,
        en: r.c[2]?.v,
        A: r.c[3]?.v,
        B: r.c[4]?.v,
        C: r.c[5]?.v,
        D: r.c[6]?.v,
        g: r.c[7]?.v
    }));

    let disciplinas = [...new Set(banco.map(q => q.disc))];

    let sel = document.getElementById("disciplina");
    sel.innerHTML = "";
    disciplinas.forEach(d => sel.innerHTML += `<option>${d}</option>`);
}

// ================= INICIAR =================
function iniciarProva() {
    let disc = document.getElementById("disciplina").value;

    prova = banco.filter(q => q.disc === disc)
                 .sort(() => 0.5 - Math.random())
                 .slice(0, 10);

    render();

    tempo = 0;
    clearInterval(intervalo);
    intervalo = setInterval(() => {
        tempo++;
        let m = String(Math.floor(tempo/60)).padStart(2,'0');
        let s = String(tempo%60).padStart(2,'0');
        document.getElementById("timer").innerText = `${m}:${s}`;
    },1000);
}

// ================= RENDER =================
function render() {
    let div = document.getElementById("questoes");
    div.innerHTML = "";

    prova.forEach((q,i) => {
        div.innerHTML += `
        <div class="questao">
        <b>${i+1}. ${q.en}</b>
        ${["A","B","C","D"].map(l=>`
        <label><input type="radio" name="q${q.id}" value="${l}"> ${l}) ${q[l]}</label>
        `).join("")}
        <div id="r${q.id}"></div>
        </div>
        `;
    });
}

// ================= FINALIZAR =================
async function finalizarProva() {
    clearInterval(intervalo);

    let acertos = 0;

    prova.forEach(q => {
        let m = document.querySelector(`input[name="q${q.id}"]:checked`);
        let r = document.getElementById(`r${q.id}`);

        if (!m) {
            r.innerHTML = "⚠️";
        } else if (m.value === q.g) {
            acertos++;
            r.innerHTML = "✅";
        } else {
            r.innerHTML = `❌ (${q.g})`;
        }
    });

    let nome = document.getElementById("nome").value || "Aluno";

    document.getElementById("resultado").innerHTML =
        `Resultado: ${acertos}/${prova.length}`;

    await fetch(SCRIPT_URL, {
        method:"POST",
        body:JSON.stringify({
            tipo:"SALVAR_RESULTADO",
            nome,
            disciplina: document.getElementById("disciplina").value,
            acertos,
            total: prova.length
        })
    });

    carregarRanking();
}

// ================= RANKING =================
async function carregarRanking() {
    let res = await fetch(SCRIPT_URL);
    let data = await res.json();

    let div = document.getElementById("ranking");
    div.innerHTML = data.map(r => `
        <div>${r.nome} - ${r.percentual.toFixed(1)}%</div>
    `).join("");
}
</script>

</body>
</html>
