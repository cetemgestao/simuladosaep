<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.editor {
  border:1px solid #ccc;
  min-height:80px;
  padding:10px;
  margin-bottom:10px;
  background:white;
}

button {
  padding:10px;
  background:#004aad;
  color:white;
  border:none;
  cursor:pointer;
  margin-right:5px;
}

.preview {
  margin-top:20px;
  padding:15px;
  border:1px dashed #999;
  background:#fafafa;
}

img {
  max-width:300px;
  margin:10px 0;
}
</style>

</head>

<body>

<div class="container">

<h2>Inserir Questão</h2>

<input id="disciplina" placeholder="Disciplina"><br><br>

<h3>Enunciado</h3>
<div id="enunciado" class="editor" contenteditable="true"></div>

<label>Imagem (opcional)</label>
<input type="file" id="imagem"><br><br>

<h3>Alternativa A</h3>
<div id="A" class="editor" contenteditable="true"></div>

<h3>Alternativa B</h3>
<div id="B" class="editor" contenteditable="true"></div>

<h3>Alternativa C</h3>
<div id="C" class="editor" contenteditable="true"></div>

<h3>Alternativa D</h3>
<div id="D" class="editor" contenteditable="true"></div>

<select id="gabarito">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<br><br>

<!-- BOTÕES -->
<button onclick="gerarPreview()">VISUALIZAR</button>
<button onclick="enviar()">SALVAR</button>

<!-- PREVIEW -->
<div id="preview" class="preview"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzrLDvGQAMCLednv5XB4hF7_xC2U90tsAd-vafWGzBgHbNb2bkaHPfoDMzMl3npXI_MbA/exec";

// PREVIEW
function gerarPreview(){

  let enunciado = document.getElementById("enunciado").innerHTML;

  let altA = document.getElementById("A").innerHTML;
  let altB = document.getElementById("B").innerHTML;
  let altC = document.getElementById("C").innerHTML;
  let altD = document.getElementById("D").innerHTML;

  let file = document.getElementById("imagem").files[0];
  let imgPreview = "";

  if(file){
    imgPreview = `<img src="${URL.createObjectURL(file)}">`;
  }

  document.getElementById("preview").innerHTML = `
    <h3>Preview da questão</h3>

    <div>${enunciado}</div>
    ${imgPreview}

    <br>

    <div><b>A)</b> ${altA}</div>
    <div><b>B)</b> ${altB}</div>
    <div><b>C)</b> ${altC}</div>
    <div><b>D)</b> ${altD}</div>
  `;
}

// BASE64
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

// ENVIAR
async function enviar(){

  let file = document.getElementById("imagem").files[0];
  let base64 = "";

  if(file){
    base64 = await toBase64(file);
  }

  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      tipo:"INSERIR_QUESTAO",
      disciplina:document.getElementById("disciplina").value,
      enunciado: document.getElementById("enunciado").innerHTML,
      imagem: base64,
      A: document.getElementById("A").innerHTML,
      B: document.getElementById("B").innerHTML,
      C: document.getElementById("C").innerHTML,
      D: document.getElementById("D").innerHTML,
      gabarito: document.getElementById("gabarito").value
    })
  });

  let r = await res.json();

  document.getElementById("preview").innerHTML =
    r.status==="ok" ? "✅ Salvo com sucesso" : "❌ Erro";
}

</script>

</body>
</html>
