<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Completo</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}

.editor {
  border:1px solid #ccc;
  min-height:80px;
  padding:10px;
  margin-bottom:10px;
  background:white;
}

button {
  padding:10px;
  background:#004aad;
  color:white;
  border:none;
  cursor:pointer;
  margin-right:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Inserir Questão</h2>

<input id="disciplina" placeholder="Disciplina"><br><br>

<h3>Enunciado</h3>
<div id="enunciado" class="editor" contenteditable="true"></div>

<label>Imagem (opcional)</label>
<input type="file" id="imagem"><br><br>

<h3>Alternativa A</h3>
<div id="A" class="editor" contenteditable="true"></div>

<h3>Alternativa B</h3>
<div id="B" class="editor" contenteditable="true"></div>

<h3>Alternativa C</h3>
<div id="C" class="editor" contenteditable="true"></div>

<h3>Alternativa D</h3>
<div id="D" class="editor" contenteditable="true"></div>

<select id="gabarito">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<br><br>

<button onclick="enviar()">SALVAR</button>

<div id="msg"></div>

</div>

<script>
const API = "COLE_AQUI_SEU_LINK";

// converter imagem
function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
  });
}

async function enviar(){

  let file = document.getElementById("imagem").files[0];
  let base64 = "";

  if(file){
    base64 = await toBase64(file);
  }

  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      tipo:"INSERIR_QUESTAO",
      disciplina:document.getElementById("disciplina").value,
      enunciado: document.getElementById("enunciado").innerHTML,
      imagem: base64,
      A: document.getElementById("A").innerHTML,
      B: document.getElementById("B").innerHTML,
      C: document.getElementById("C").innerHTML,
      D: document.getElementById("D").innerHTML,
      gabarito: document.getElementById("gabarito").value
    })
  });

  let r = await res.json();

  document.getElementById("msg").innerHTML =
    r.status==="ok" ? "✅ Salvo com sucesso" : "❌ Erro";
}
</script>

</body>
</html>
